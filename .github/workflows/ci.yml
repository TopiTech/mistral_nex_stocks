name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npx prettier --check "static/js/**/*.js" "chrome_extension/**/*.js"

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lint.txt

      - name: Run ruff
        run: ruff check . --line-length=100

      - name: Run flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run pylint (errors only)
        run: pylint --errors-only --disable=import-error app.py config_utils.py trend_sources.py native_host/native_host.py

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-requests types-python-dateutil

      - name: Run mypy
        run: mypy

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-locked.txt
          pip install bandit pip-audit

      - name: Run Bandit (fail on MEDIUM or HIGH)
        run: bandit --configfile pyproject.toml -r . --severity-level medium -f txt -o bandit_report.txt

      - name: Run pip-audit
        run: pip-audit -r requirements-locked.txt --strict

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit_report.txt

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install keyring system dependencies (Ubuntu runners)
        run: |
          # Remove third-party repos (e.g. packages.microsoft.com / azure-cli)
          # that may fail to validate on CI runners with NOSPLIT / no longer signed
          # errors. Without this, apt-get update aborts the whole step.
          sudo find /etc/apt/sources.list.d/ -type f -exec grep -li 'packages.microsoft.com' {} \; 2>$null | sudo xargs -r rm -f || true
          # Tolerate transient/third-party repo failures so CI is not blocked.
          sudo apt-get update -o Acquire::Retries=3 || true
          sudo apt-get install -y libsecret-1-0 libsecret-1-dev gnome-keyring dbus-user-session || true

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements-locked.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=65

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
