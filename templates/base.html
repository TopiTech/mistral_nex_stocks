<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" />
    {% block meta %}{% endblock %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/colors.css') }}" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Orbitron:wght@500;700&display=swap"
      rel="stylesheet"
    />
    {% block styles %}{% endblock %}
    <script nonce="{{ csp_nonce }}" id="default-symbols-data" type="application/json">
      {{ default_symbols | tojson | safe }}
    </script>
    <script nonce="{{ csp_nonce }}" id="app-config-data" type="application/json">
      {{ app_config | tojson | safe }}
    </script>
    <script
      nonce="{{ csp_nonce }}"
      src="{{ url_for('static', filename='js/csrf.js') }}?v=20260501a"
    ></script>
  </head>
  <body class="{% block body_class %}{% endblock %}">
    {% block header %}{% endblock %}
    {% block content %}{% endblock %}
    {% block footer %}{% endblock %}

    <!-- Shared scripts -->
    <script
      nonce="{{ csp_nonce }}"
      src="{{ url_for('static', filename='js/utils.js') }}?v=20260412a"
    ></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
