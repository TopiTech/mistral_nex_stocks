<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" />
    {% block title %}<title>Mistral NeX Stocks</title>{% endblock %}
    {% block meta %}{% endblock %}
    <link rel="stylesheet" href="{{ static_url('css/colors.css') }}" />
    {% block styles %}{% endblock %}
    {% block libs %}{% endblock %}
    <script nonce="{{ csp_nonce }}" id="default-symbols-data" type="application/json">
      {{ default_symbols | tojson | safe }}
    </script>
    <script nonce="{{ csp_nonce }}" id="app-config-data" type="application/json">
      {{ app_config | tojson | safe }}
    </script>
    <script
      nonce="{{ csp_nonce }}"
      src="{{ static_url('js/csrf.js') }}"
    ></script>
  </head>
  <body class="{% block body_class %}{% endblock %}">
    {% block header %}{% endblock %}
    {% block content %}{% endblock %}
    {% block footer %}{% endblock %}

    <!-- Shared utility functions loaded on every page before page scripts -->
    <script nonce="{{ csp_nonce }}" src="{{ static_url('js/utils.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
