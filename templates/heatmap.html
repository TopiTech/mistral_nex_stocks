<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Market Heatmap - Mistral NeX Stocks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/colors.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/heatmap.css') }}" />
</head>
<body class="heatmap-page">
  <header>
    <div class="back-link">
      <a href="/main">← Dashboard</a>
    </div>
    <h1>Market Heatmap <span class="model-badge">{{ model_badge }}</span></h1>
    <div class="subtitle">Global Market Visualization</div>
  </header>

  <div class="container">
    <div class="heatmap-controls">
      <div class="market-toggle">
        <button id="toggle-us" class="toggle-btn active">🇺🇸 USA</button>
        <button id="toggle-jp" class="toggle-btn">🇯🇵 JAPAN</button>
      </div>
      <div class="last-update">Last Update: <span id="update-time">-</span></div>
    </div>

    <div id="heatmap-container" class="heatmap-container">
      <div id="heatmap-loading" class="loading-overlay">
        <div class="spinner"></div>
        <p>Fetching Market Data...</p>
      </div>
      <div id="heatmap-canvas" class="heatmap-canvas"></div>
    </div>

    <div class="heatmap-legend">
      <span>-3%</span>
      <div class="legend-bar"></div>
      <span>+3%</span>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Mistral NeX Stocks | Powered by Mistral AI & yfinance</p>
  </footer>

  <script src="{{ url_for('static', filename='js/heatmap.js') }}"></script>
</body>
</html>
