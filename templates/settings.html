<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" />
    <title>設定 - Mistral NeX Stocks</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/colors.css') }}" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/settings.css') }}?v=20260319a"
    />
  </head>
  <body>
    <header>
      <div class="title">⚙️ 設定 <span class="model-badge">{{ model_badge }}</span></div>
      <button class="back-btn" id="back-btn" type="button">← メイン画面へ</button>
    </header>
    <div class="container">
      <div class="section">
        <div class="section-title">登録銘柄（並び替え＋削除）</div>
        <div class="note">
          ・ドラッグ＆ドロップ（☰）で順番を変更できます<br />
          ・「削除」ボタンで個別削除できます<br />
          ・ここでの順番がメイン画面の表示順になります（ユーザー追加銘柄のみ対象）
        </div>
        <div class="market-block">
          <div class="market-title">🇺🇸 米国市場（追加銘柄）</div>
          <ul id="us-list" class="stock-list"></ul>
        </div>
        <div class="market-block">
          <div class="market-title">🇯🇵 日本市場（追加銘柄）</div>
          <ul id="jp-list" class="stock-list"></ul>
        </div>
        <div class="market-block">
          <div class="market-title">📊 インデックス/ETF（追加銘柄）</div>
          <ul id="idx-list" class="stock-list"></ul>
        </div>
      </div>
      <div class="section">
        <div class="section-title">全銘柄初期化</div>
        <div class="note">すべての追加銘柄を削除し、デフォルト状態に戻します</div>
        <button class="reset-btn" type="button" id="reset-btn">⚠️ すべての追加銘柄を削除</button>
      </div>
      <div class="section">
        <div class="section-title">APIキー初期化</div>
        <div class="note">Mistral APIキーを削除し、ログアウトします</div>
        <button class="logout-btn" type="button" id="logout-btn">
          🔑 APIキーを削除（ログアウト）
        </button>
      </div>
    </div>
    <script nonce="{{ csp_nonce }}" id="default-symbols-data" type="application/json">
      {{ default_symbols | tojson | safe }}
    </script>
    <script nonce="{{ csp_nonce }}" id="app-config-data" type="application/json">
      {{ app_config | tojson | safe }}
    </script>
    <script
      nonce="{{ csp_nonce }}"
      src="{{ url_for('static', filename='js/csrf.js') }}?v=20260501a"
    ></script>
    <script
      nonce="{{ csp_nonce }}"
      src="{{ url_for('static', filename='js/settings.js') }}?v=20260411b"
    ></script>
  </body>
</html>
